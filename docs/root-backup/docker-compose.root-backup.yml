version: '3.8'

services:
  frontend:
    build: ./teg-frontend
    container_name: teg_front
    ports:
      - "80:80"
    networks:
      - front-net
    depends_on:
      - backend
  
  backend:
    build: ./teg-backend
    container_name: teg_back
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
    networks:
      - front-net
      - back-net
    depends_on:
      - db
    volumes:
      - backend_media:/app/media

  db:
    image: postgres:15
    container_name: teg_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - back-net
    
  metabase:
    image: metabase/metabase:latest
    container_name: teg_metabase
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${MB_DB_DBNAME}
      - MB_DB_PORT=${DB_PORT}
      - MB_DB_USER=${DB_USER}
      - MB_DB_PASS=${DB_PASSWORD}
      - MB_DB_HOST=metabase-db
    networks:
      - back-net
    depends_on:
      - metabase-db
      - db
    
  # DB interna de Metabase
  metabase-db:
    image: postgres:15
    container_name: metabase_internal_db
    environment:
      POSTGRES_DB: ${MB_DB_DBNAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - metabase_data:/var/lib/postgresql/data
    networks:
      - back-net

networks:
  front-net:
  back-net:

volumes:
  db_data:
  metabase_data:
  backend_media:
